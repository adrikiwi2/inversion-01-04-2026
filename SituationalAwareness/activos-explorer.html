<head>

<title>Activos Explorer — Infraestructura IA 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #101114;
    --surface: #18191f;
    --surface2: #1f2028;
    --border: #272937;
    --border-subtle: #1f2130;
    --text: #e8eaf0;
    --text2: #7b7f95;
    --text3: #4a4e62;
    --accent: #3b82f6;
    --accent-dim: rgba(59,130,246,.08);
    --accent-mid: rgba(59,130,246,.15);
    --green: #10b981;
    --yellow: #f59e0b;
    --red: #ef4444;
    --orange: #f97316;
    --purple: #8b5cf6;
    --pink: #ec4899;
    --cyan: #06b6d4;
    --teal: #14b8a6;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Outfit', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    overflow-x: hidden;
  }

  /* === TOPBAR === */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 80;
    background: rgba(16,17,20,.85);
    backdrop-filter: blur(16px) saturate(1.2);
    -webkit-backdrop-filter: blur(16px) saturate(1.2);
    border-bottom: 1px solid var(--border-subtle);
    padding: 16px 28px;
  }
  .topbar-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .logo {
    font-weight: 800;
    font-size: 17px;
    letter-spacing: -.3px;
    white-space: nowrap;
    color: var(--text);
  }
  .logo span { color: var(--accent); }
  .search-wrap {
    flex: 1;
    min-width: 200px;
    max-width: 400px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    width: 16px;
    height: 16px;
  }
  .search-input {
    width: 100%;
    padding: 9px 14px 9px 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    outline: none;
    transition: border-color .2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }
  .pill-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .pill {
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid var(--border);
    border-radius: 100px;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
    font-family: inherit;
  }
  .pill:hover { border-color: var(--accent); color: var(--text); }
  .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .pill .count {
    display: inline-block;
    margin-left: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    opacity: .6;
  }

  /* === VERTICAL CHIPS (below topbar) === */
  .chip-bar {
    max-width: 1400px;
    margin: 0 auto;
    padding: 12px 28px 0;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .chip {
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 600;
    border-radius: 6px;
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    transition: all .2s;
    border: 1px solid transparent;
    font-family: inherit;
  }
  .chip:hover { color: var(--text); border-color: var(--border); }
  .chip.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent-mid); }
  .chip .dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 2px;
    margin-right: 5px;
    vertical-align: middle;
  }

  /* === GRID === */
  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 28px 80px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 10px;
  }
  .section-label {
    grid-column: 1 / -1;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text3);
    padding: 20px 0 6px;
  }
  .section-label:first-child { padding-top: 0; }

  /* === CARD (minimal) === */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    cursor: pointer;
    position: relative;
    transition: border-color .2s, background .2s;
    overflow: hidden;
    animation: cardIn .4s cubic-bezier(.16,1,.3,1) both;
  }
  .card:active { transform: scale(.985); }
  .card:hover {
    border-color: #3a3d50;
    background: var(--surface2);
  }
  .card .stripe {
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    border-radius: 10px 0 0 10px;
    opacity: .6;
    transition: opacity .2s;
  }
  .card:hover .stripe { opacity: 1; }
  .card .c-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .card .c-ticker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: .3px;
  }
  .card .c-badge {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .8px;
    padding: 2px 7px;
    border-radius: 4px;
  }
  .b-stock { background: var(--accent-dim); color: var(--accent); }
  .b-etf { background: rgba(16,185,129,.1); color: var(--green); }
  .b-trust { background: rgba(245,158,11,.1); color: var(--yellow); }
  .b-ucits { background: rgba(20,184,166,.08); color: var(--teal); font-size: 8px; margin-left: 4px; }
  .b-sa { background: rgba(249,115,22,.1); color: var(--orange); font-size: 8px; margin-left: 4px; }
  .card .c-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card .c-country {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .card { animation: none; }
  }

  /* === DETAIL PANEL (slide-in overlay) === */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: flex;
    justify-content: flex-end;
    pointer-events: none;
    opacity: 0;
    transition: opacity .25s;
  }
  .overlay.open {
    pointer-events: auto;
    opacity: 1;
  }
  .overlay-bg {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,.55);
    cursor: pointer;
  }
  .panel {
    position: relative;
    width: 520px;
    max-width: 100vw;
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform .35s cubic-bezier(.16,1,.3,1);
    display: flex;
    flex-direction: column;
  }
  .overlay.open .panel { transform: translateX(0); }
  @media (prefers-reduced-motion: reduce) {
    .panel { transition: none; }
    .overlay { transition: none; }
  }
  .panel-close {
    position: absolute;
    top: 16px; right: 16px;
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
    z-index: 5;
  }
  .panel-close:hover { border-color: var(--accent); color: var(--text); }

  /* Panel header */
  .p-header {
    padding: 32px 28px 20px;
    border-bottom: 1px solid var(--border);
  }
  .p-header .p-vertical {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
  }
  .p-header .p-ticker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: .5px;
    color: var(--text);
  }
  .p-header .p-name {
    font-size: 16px;
    font-weight: 500;
    color: var(--text2);
    margin-top: 4px;
  }
  .p-header .p-badges {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .p-header .p-badge {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .6px;
    padding: 3px 10px;
    border-radius: 5px;
  }

  /* Panel body */
  .p-body { padding: 24px 28px; flex: 1; }
  .p-section {
    margin-bottom: 24px;
  }
  .p-section-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text3);
    margin-bottom: 10px;
  }
  .p-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .p-field { display: flex; flex-direction: column; gap: 2px; }
  .p-field .fl { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .6px; }
  .p-field .fv { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text); word-break: break-all; }
  .p-role {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.6;
  }

  /* Hypothesis section */
  .hyp-divider {
    height: 1px;
    background: linear-gradient(90deg, var(--accent-mid), transparent);
    margin: 0 0 24px;
  }
  .hyp-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .hyp-field {
    margin-bottom: 16px;
  }
  .hyp-field .hl {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--text3);
    margin-bottom: 6px;
  }
  .hyp-field .hv {
    font-size: 13px;
    color: var(--text3);
    font-style: italic;
    line-height: 1.5;
  }
  .conviction-row {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .conviction-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    transition: all .2s;
  }
  .conviction-dot.filled {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 10px rgba(59,130,246,.3);
  }
  .catalyst-list, .risk-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .cat-item, .risk-item {
    font-size: 12px;
    color: var(--text3);
    font-style: italic;
    padding-left: 16px;
    position: relative;
    line-height: 1.4;
  }
  .cat-item::before, .risk-item::before {
    content: '';
    position: absolute;
    left: 0; top: 6px;
    width: 6px; height: 6px;
    border-radius: 2px;
  }
  .cat-item::before { background: var(--green); opacity: .3; }
  .risk-item::before { background: var(--red); opacity: .3; }

  /* Meta row in hypothesis */
  .hyp-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  /* Research source underline */
  .src-research {
    border-left: 2px solid rgba(59,130,246,.35);
    padding-left: 10px;
    position: relative;
  }
  .src-research::after {
    content: 'Research SA LP';
    position: absolute;
    top: -2px;
    right: 0;
    font-size: 8px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(59,130,246,.4);
    pointer-events: none;
  }

  /* Empty / no results */
  .no-results {
    text-align: center;
    padding: 80px 20px;
    color: var(--text3);
    font-size: 14px;
  }

  /* Stats */
  .stats-line {
    display: flex;
    gap: 20px;
    padding: 12px 0 8px;
    font-size: 12px;
    color: var(--text3);
    flex-wrap: wrap;
  }
  .stats-line b {
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  @media (max-width: 640px) {
    .grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .topbar-inner { gap: 12px; }
    .search-wrap { max-width: 100%; min-width: 0; }
    .panel { width: 100vw; }
    .main { padding: 16px 16px 60px; }
    .chip-bar { padding: 10px 16px 0; }
    .topbar { padding: 12px 16px; }
  }
  @media (max-width: 400px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>

// State
let activeType='all', activeVertical=null, query='';
const overlay=document.getElementById('overlay');
const overlayBg=document.getElementById('overlayBg');
const panelClose=document.getElementById('panelClose');
const panelContent=document.getElementById('panelContent');

// Verticals with colors
const verticals=[...new Map(ASSETS.map(a=>[a.vertical,a.vc])).entries()];

// Type pills
function renderTypePills(){
  const counts={all:ASSETS.length};
  ASSETS.forEach(a=>{counts[a.type]=(counts[a.type]||0)+1});
  const labels={all:'Todos',stock:'Acciones',etf:'ETFs',trust:'Trusts'};
  document.getElementById('typePills').innerHTML=Object.entries(labels).map(([k,v])=>
    `<button class="pill${activeType===k?' active':''}" data-t="${k}">${v}<span class="count">${counts[k]||0}</span></button>`
  ).join('');
  document.querySelectorAll('.pill[data-t]').forEach(b=>b.onclick=()=>{activeType=b.dataset.t;activeVertical=null;render()});
}

// Vertical chips
function renderChips(){
  const vis=activeType==='all'?verticals:verticals.filter(([v])=>ASSETS.some(a=>a.vertical===v&&a.type===activeType));
  document.getElementById('chipBar').innerHTML=
    `<button class="chip${!activeVertical?' active':''}" data-v="">Todas</button>`+
    vis.map(([v,c])=>`<button class="chip${activeVertical===v?' active':''}" data-v="${v}"><span class="dot" style="background:${c}"></span>${v}</button>`).join('');
  document.querySelectorAll('.chip[data-v]').forEach(b=>b.onclick=()=>{activeVertical=b.dataset.v||null;render()});
}

// Filter
function getFiltered(){
  return ASSETS.filter(a=>{
    if(activeType!=='all'&&a.type!==activeType)return false;
    if(activeVertical&&a.vertical!==activeVertical)return false;
    if(query){const h=[a.ticker,a.name,a.isin,a.exchange,a.country,a.role,a.vertical,a.provider||''].join(' ').toLowerCase();return h.includes(query)}
    return true;
  });
}

// Render cards
function render(){
  renderTypePills();
  renderChips();
  const items=getFiltered();
  const grid=document.getElementById('grid');
  const noRes=document.getElementById('noResults');
  const stats=document.getElementById('statsLine');
  if(!items.length){grid.innerHTML='';noRes.style.display='block';stats.innerHTML='';return}
  noRes.style.display='none';
  const sc=items.filter(i=>i.type==='stock').length;
  const ec=items.filter(i=>i.type==='etf').length;
  const tc=items.filter(i=>i.type==='trust').length;
  const sac=items.filter(i=>i.sa).length;
  stats.innerHTML=`<span><b>${items.length}</b> activos</span><span><b>${sc}</b> acciones</span><span><b>${ec}</b> ETFs</span><span><b>${sac}</b> en SA LP</span>`;
  // Group
  const grouped={};
  items.forEach(a=>{if(!grouped[a.vertical])grouped[a.vertical]=[];grouped[a.vertical].push(a)});
  let html='',idx=0;
  for(const[vertical,assets]of Object.entries(grouped)){
    html+=`<div class="section-label">${vertical}</div>`;
    for(const a of assets){
      const badges=[];
      const btype=a.type==='stock'?'b-stock':a.type==='etf'?'b-etf':'b-trust';
      badges.push(`<span class="c-badge ${btype}">${a.type}</span>`);
      if(a.ucits)badges.push(`<span class="c-badge b-ucits">UCITS</span>`);
      if(a.sa)badges.push(`<span class="c-badge b-sa">SA LP</span>`);
      html+=`<div class="card" data-id="${a.id}" style="animation-delay:${idx*30}ms">
        <div class="stripe" style="background:${a.vc}"></div>
        <div class="c-top">
          <span class="c-ticker">${a.ticker}</span>
          <span>${badges.join('')}</span>
        </div>
        <div class="c-name">${a.name}</div>
        <div class="c-country">${a.country} \u00b7 ${a.exchange}</div>
      </div>`;
      idx++;
    }
  }
  grid.innerHTML=html;
  grid.querySelectorAll('.card').forEach(c=>c.onclick=()=>openPanel(+c.dataset.id));
}

4:{thesis:"Consumidor pesado de compute/potencia para entrenar LLaMA y servir metaverso. Posee data centers pero no genera energ\u00eda. Capex IA masivo (~37B$+ en 2025) pero sigue siendo lado demanda.",conv:2,horizon:"12\u201318 meses",cats:["Earnings Q1 2026 con capex IA sostenido/incrementado","Nuevos anuncios de construcci\u00f3n de data centers"],risks:["Competencia por acceso a compute con otros hiperscalers (escalada de precios)","Retrasos regulatorios en permisos de data centers"],sa:"No en 13F Q4 2025"},
5:{thesis:"Mega-consumidor de GPU compute v\u00eda partnership con OpenAI. Azure enfrenta restricciones de potencia. Lado demanda, no oferta. La tesis de SA LP: generaci\u00f3n de energ\u00eda y activos f\u00edsicos son el cuello de botella, no licencias de software.",conv:2,horizon:"12\u201318 meses",cats:["Capex Q1 2026 m\u00e1s alto de la historia para expansi\u00f3n de Azure","Potenciales partnerships estrat\u00e9gicos con generadores de energ\u00eda (SMR/nuclear)"],risks:["Presi\u00f3n en precios de Azure si la oferta de compute aumenta (commoditizaci\u00f3n)","Retrasos en suministro el\u00e9ctrico impactan timelines de entrenamiento de OpenAI"],sa:"No en 13F Q4 2025"},
6:{thesis:"SA LP liquid\u00f3/redujo expl\u00edcitamente esta posici\u00f3n en Q4 2025. Tesis: los chips NO son el cuello de botella, la potencia el\u00e9ctrica S\u00cd lo es. NVIDIA se beneficia del s\u00edntoma, no de la restricci\u00f3n. Rot\u00f3 capital de 'dise\u00f1adores de chips' a 'due\u00f1os de vatios'.",conv:1,horizon:"6 meses",cats:["Demanda de Blackwell sigue fuerte en 2026","Competencia de AMD MI300x ganando share en inferencia"],risks:["Poder de pricing se erosiona si la oferta de GPUs crece vs. disponibilidad de potencia/refrigeraci\u00f3n","Tesis SA LP: valor atrapado en dise\u00f1o de chips vs. propiedad de infraestructura","Restricciones geopol\u00edticas de semiconductores a China"],sa:"LIQUIDADO / REDUCIDO en Q4 2025"},
7:{thesis:"Beneficiario indirecto v\u00eda almacenamiento energ\u00e9tico (bater\u00edas) y generaci\u00f3n renovable (SolarCity). Potencial para soluciones de estabilidad de red para data centers. \u00c1ngulo especulativo de infraestructura.",conv:2,horizon:"+2 a\u00f1os",cats:["Escalado de despliegue de almacenamiento energ\u00e9tico Tesla en 2026","Contratos de servicios de red para estabilizaci\u00f3n de potencia de data centers IA"],risks:["Negocio de almacenamiento es peque\u00f1a porci\u00f3n de ingresos vs. automotriz","Incertidumbre regulatoria en mercados energ\u00e9ticos"],sa:"No en 13F Q4 2025"},
8:{thesis:"Alternativa GPU a NVIDIA (MI300x) pero enfrenta el mismo headwind de tesis: los chips no son el cuello de botella. AMD tambi\u00e9n es 'dise\u00f1ador de chips', no 'due\u00f1o de vatios'. Misma l\u00f3gica de rotaci\u00f3n que NVIDIA.",conv:1,horizon:"6 meses",cats:["Wins de MI300x en cargas de inferencia (cuota vs NVIDIA)","Partnerships con cloud providers para ASICs custom"],risks:["Ventajas arquitect\u00f3nicas de NVIDIA (ecosistema CUDA) dif\u00edciles de superar","Misma compresi\u00f3n de m\u00e1rgenes que dise\u00f1adores de chips cuando oferta crece","Exposici\u00f3n geopol\u00edtica a fabricaci\u00f3n en TSMC (Taiw\u00e1n)"],sa:"No en 13F Q4 2025"},
9:{thesis:"Broadcom suministra ASICs de networking y chips custom para clusters de IA, pero SA LP redujo expl\u00edcitamente esta posici\u00f3n. Networking es importante pero no es el foco de 'due\u00f1os de vatios'. Los chips no son la restricci\u00f3n.",conv:2,horizon:"6 meses",cats:["Demanda de ASIC custom para networking de clusters IA de nueva generaci\u00f3n","Competencia con Arista Networks en switching/networking"],risks:["M\u00e1rgenes de ASIC custom se comprimen con m\u00e1s competencia","Networking es 5-10% del capex de data centers vs. GPUs y potencia","Tesis SA LP: networking es problema resuelto, potencia no lo es"],sa:"LIQUIDADO / REDUCIDO en Q4 2025"},
10:{thesis:"SA LP mantiene posici\u00f3n con opciones CALL (apuesta de convexidad). No es por CPUs ni Gaudi, sino por fabricaci\u00f3n dom\u00e9stica de chips en EE.UU. 'Soberan\u00eda computacional americana': EE.UU. necesita capacidad de fundici\u00f3n onshore separada de la dependencia de TSMC.",conv:3,horizon:"18\u201336 meses",cats:["Mejoras de nodo de proceso Intel Foundry (7nm, 5nm ramp 2026-2027)","Despliegue de fondos CHIPS Act y utilizaci\u00f3n de capacidad","Wins estrat\u00e9gicos fabricando ASICs custom para aceleradores IA"],risks:["Intel lucha con competencia de nodo vs. TSMC 3nm/2nm","Alto capex burn con compromisos inciertos de clientes de foundry","Dependencia de subsidios gubernamentales (CHIPS Act) crea riesgo pol\u00edtico"],sa:"EN CARTERA (~749M$, ~2.7%). CALL OPTIONS = convexidad"},
// === BATCH 2: Semiconductores (cont.) — IDs 11-20 ===
11:{thesis:"Proveedor cr\u00edtico de memoria HBM3E de alto ancho de banda para aceleradores NVIDIA. La escasez de HBM es cuello de botella tangible para despliegue de IA 2026-2028. A diferencia de NVIDIA (dise\u00f1o), Micron es fabricante f\u00edsico que consume energ\u00eda masiva en producci\u00f3n de memoria. Migraci\u00f3n de valor de dise\u00f1o a manufactura f\u00edsica de componentes cr\u00edticos.",conv:4,horizon:"24\u201336 meses",cats:["Escasez de HBM3E es cuello de botella tangible 2026","Alzas de precio HBM hasta 70% por escasez cr\u00edtica","Expansi\u00f3n de capacidad de fabricaci\u00f3n en EE.UU. (CHIPS Act)"],risks:["Competencia Samsung/SK Hynix puede comprimir m\u00e1rgenes","Riesgo de sobrecapacidad DRAM en ciclo bajista","Memoria es c\u00edclica \u2014 downturn puede borrar ganancias"],sa:"No en 13F Q4 2025, pero memoria HBM mencionada como cr\u00edtica en docs de cadena suministro"},
12:{thesis:"Mayor fundici\u00f3n de chips avanzados del mundo (72% de nodos vanguardia). SA LP VENDI\u00d3/REDUJO TSMC en Q4 2025 por riesgo geopol\u00edtico (Taiw\u00e1n, no soberan\u00eda computacional americana). Capex 2026 de $54B indica confianza en demanda IA, pero exposici\u00f3n geogr\u00e1fica inconsistente con tesis de soberan\u00eda US.",conv:2,horizon:"24\u201336 meses",cats:["Capex $54B en 2026 indica demanda estructural","Monopolio de nodos 3nm/2nm para IA","Diversificaci\u00f3n geogr\u00e1fica (fabs en Arizona, Jap\u00f3n)"],risks:["Tensi\u00f3n China-Taiw\u00e1n es riesgo existencial","Sanciones y export controls limitan mercado","SA LP vendi\u00f3 expl\u00edcitamente por concentraci\u00f3n geogr\u00e1fica"],sa:"VENDIDA/REDUCIDA en Q4 2025 \u2014 rot\u00f3 capital hacia energ\u00eda y fundiciones aliadas"},
13:{thesis:"Proveedor #1 de memoria HBM para NVIDIA con ~50% de cuota de mercado. Proyecciones de alzas de precio HBM hasta 70% en 2026 por escasez cr\u00edtica. Pero SK Hynix es COREANO, fuera del per\u00edmetro de 'soberan\u00eda computacional americana' de SA LP. Exposici\u00f3n pura a cuello de botella de memoria sin alineaci\u00f3n geogr\u00e1fica con tesis.",conv:3,horizon:"24\u201336 meses",cats:["Alzas de precio HBM hasta 70% por escasez","Contratos exclusivos con NVIDIA para Blackwell/Vera Rubin","Expansi\u00f3n capacidad HBM3E en 2026"],risks:["Fuera del per\u00edmetro de soberan\u00eda US","Riesgo de sobrecapacidad futura si ciclo gira","Dependencia de un solo cliente (NVIDIA)"],sa:"Mencionado como alternativa cr\u00edtica pero NO en holdings directos 13F Q4 2025"},
14:{thesis:"Alternativa a SK Hynix en memoria HBM con ~38% cuota mercado global. R&D masivo ($26B en 2025). Beneficiario directo de escasez HBM. Pero Samsung es conglomerado diversificado coreano \u2014 SA LP busca pure plays de infraestructura f\u00edsica con alineaci\u00f3n US o aliados directos.",conv:2,horizon:"24\u201336 meses",cats:["Lanzamiento HBM4 previsto para 2026-2027","Diversificaci\u00f3n: foundry + memoria + displays","R&D de $26B permite competir en nodos avanzados"],risks:["Conglomerado diluye exposici\u00f3n a tesis IA","Fuera de per\u00edmetro geogr\u00e1fico de soberan\u00eda US","Competencia frontal con SK Hynix en HBM"],sa:"No en 13F SA LP. Cuello de botella v\u00e1lido pero sin alineaci\u00f3n con criterios de cartera"},
15:{thesis:"M\u00e1quina de litograf\u00eda EUV \u2014 tecnolog\u00eda CR\u00cdTICA e INSUSTITUIBLE para fabricar nodos avanzados (2nm+). ASML controla 100% del mercado de EUV. Margen bruto 52.8%. High-NA EUV 2026 abre acceso a Intel/TSMC 2nm. PERO: ASML es HOLANDESA, no US. SA LP busca soberan\u00eda computacional americana \u2014 no invierte directamente en ASML.",conv:4,horizon:"36\u201360 meses",cats:["Monopolio absoluto en EUV (100% cuota)","High-NA EUV habilita nodos 2nm en 2026","Ingresos recurrentes de mantenimiento ~\u20ac8.2B"],risks:["Regulaci\u00f3n holandesa de export controls a China","Concentraci\u00f3n de monopolio atrae escrutinio","Fuera de per\u00edmetro geogr\u00e1fico de SA LP (Europa)"],sa:"Mencionado como 'cr\u00edtico' en docs pero NO en holdings 13F Q4 2025 \u2014 empresa europea"},
16:{thesis:"Fundici\u00f3n especializada ISRAEL\u00cd \u2014 ~14% del portfolio SA LP, una de las posiciones m\u00e1s grandes. Tower Semiconductor se posiciona como alternativa US-aliada a TSMC para nodos maduros/especializados. Israel = alianza geopol\u00edtica directa con EE.UU. Manufactura de semiconductores cr\u00edticos en jurisdicci\u00f3n aliada, no China/Taiw\u00e1n.",conv:5,horizon:"24\u201336 meses",cats:["Alternativa aliada a TSMC para nodos especializados","Soberan\u00eda computacional: Israel es aliado directo de EE.UU.","Reconversi\u00f3n de capacidad hacia nodos de IA/aceleradores"],risks:["Capacidad de fabricaci\u00f3n limitada vs. TSMC/Samsung","Volatilidad geopol\u00edtica de Oriente Medio","Competencia de Intel Foundry si CHIPS Act funciona"],sa:"HOLDING CORE: ~14% del portfolio SA LP Q4 2025. Posici\u00f3n activista potencial."},
17:{thesis:"Almacenamiento NAND/SSD \u2014 demanda de almacenamiento para centros datos IA explota (logs, modelos, datasets). WDC es pure play de almacenamiento con exposici\u00f3n a capex de data centers. Pero NAND es commodity downstream, menos cr\u00edtico que memoria HBM o c\u00f3mputo en el cuello de botella 2026-2028.",conv:2,horizon:"24\u201336 meses",cats:["Demanda de almacenamiento para datasets/modelos IA","Spin-off de divisi\u00f3n NAND (nuevo SanDisk) puede desbloquear valor","Capex de data centers impulsa demanda de SSDs empresariales"],risks:["NAND es commodity c\u00edclico con presi\u00f3n de precios","Sobrecapacidad recurrente en la industria","No es cuello de botella principal en la tesis"],sa:"No en 13F SA LP. SNDK aparece en docs (~13.5% portfolio) pero como holding agregado, verificar"},
18:{thesis:"Fundici\u00f3n CHINA principal. SA LP tiene CERO exposici\u00f3n directa a China por tesis de 'soberan\u00eda computacional americana'. SMIC est\u00e1 bajo presi\u00f3n de export controls de EE.UU. Aunque sirve demanda dom\u00e9stica china, no es play alineado con tesis de infraestructura IA occidental.",conv:1,horizon:"24\u201336 meses",cats:["Demanda dom\u00e9stica china de chips IA (Huawei Ascend)","Expansi\u00f3n de capacidad en nodos maduros","Independencia tecnol\u00f3gica china como narrativa"],risks:["Export controls de EE.UU. limitan acceso a equipos","China excluida deliberadamente de tesis SA LP","Riesgo geopol\u00edtico US-China escala"],sa:"Excluido deliberadamente de cartera SA LP. Tesis no compatible con soberan\u00eda americana."},
19:{thesis:"Chips anal\u00f3gicos de control energ\u00e9tico/power management \u2014 cr\u00edtico para distribuci\u00f3n el\u00e9ctrica de centros datos (rectificadores, reguladores, gesti\u00f3n t\u00e9rmica). TXN es especialista global. Pero es componente commodity downstream, no cuello de botella agudo 2026-2028.",conv:2,horizon:"24\u201336 meses",cats:["Demanda de power management en data centers crece","M\u00e1rgenes estables por modelo de fab propia","Diversificaci\u00f3n: auto, industrial, data centers"],risks:["Saturaci\u00f3n del mercado anal\u00f3gico","Presi\u00f3n de precios en componentes commodity","C\u00edclico \u2014 expuesto a downturns industriales"],sa:"No en 13F SA LP ni docs como posici\u00f3n estrat\u00e9gica. Soporte v\u00e1lido pero perif\u00e9rico."},
20:{thesis:"Equipos de fabricaci\u00f3n de semiconductores (litograf\u00eda, deposici\u00f3n, grabado). AMAT es pure play en capex de semis. Demanda explota (Intel capex masivo, TSMC +$54B 2026). Pero beneficia principalmente a fabs, no es 'due\u00f1o de vatios'. Tesis de SA LP busca activos tangibles de energ\u00eda/data centers, no suppliers de fabs upstream.",conv:2,horizon:"24\u201336 meses",cats:["Capex record de TSMC + Intel + Samsung impulsa demanda","Monopolio en procesos espec\u00edficos de deposici\u00f3n","Transici\u00f3n a nodos 2nm requiere nuevo equipamiento"],risks:["Dependencia de ciclos de capex de fabs","Competencia de ASML/Lam Research/KLA","Tesis SA LP no prioriza suppliers de fabs upstream"],sa:"No en 13F SA LP Q4 2025."},
// === BATCH 3: Servidores, Red, \u00d3ptica — IDs 21-30 ===
21:{thesis:"Proveedor cr\u00edtico de switches Ethernet de ultra-alta velocidad para interconexi\u00f3n dentro de cl\u00fasteres de IA. 400G/800G son obligatorios en topolog\u00edas Blackwell/Vera Rubin donde el ancho de banda entre GPUs supera 4TB/s. Conectividad de cluster es cuello de botella paralelo a potencia.",conv:4,horizon:"24\u201336 meses",cats:["Demanda de switches 400G/800G para cl\u00fasteres IA","Capex de hiperscalers en networking crece","Posici\u00f3n dominante vs. Cisco en data center switching"],risks:["Competencia de NVIDIA SmartNICs y DPUs","Sobrevaloraci\u00f3n por expectativas de IA","Concentraci\u00f3n de ingresos en pocos hiperscalers"],sa:"No en top 5 SA LP pero mencionado en docs como cr\u00edtico para cluster networking"},
22:{thesis:"Fabricante de servidores optimizados para IA con arquitectura modular y despliegue ultra r\u00e1pido. Beneficiario directo de demanda de reconversi\u00f3n BTC a IA y expansi\u00f3n de data centers. 'Pala y pico' del boom, aunque menos crucial que potencia el\u00e9ctrica.",conv:3,horizon:"12\u201324 meses",cats:["Demanda r\u00e9cord de servidores GPU para IA","Arquitectura modular reduce time-to-deploy","Expansion de clientes fuera de hiperscalers (enterprise)"],risks:["Margen presionado por competencia Dell/HPE","Dependencia total de suministro GPU NVIDIA","Hist\u00f3rico de problemas de calidad/auditor\u00eda"],sa:"No en portfolio SA LP. Hardware complementario, no core a tesis de potencia."},
23:{thesis:"Integrador empresarial de servidores. Menos especializado que SMCI en IA puro, pero captura demanda corporativa de data centers. Margen en servicios es atractivo pero hardware es commodity en la tesis de Aschenbrenner.",conv:2,horizon:"24\u201336 meses",cats:["Demanda enterprise de servidores PowerEdge para IA","Servicios y soporte generan ingresos recurrentes","Partnership con NVIDIA en sistemas Blackwell"],risks:["Hardware de servidores es commodity con m\u00e1rgenes bajos","Competencia hiperscalers que dise\u00f1an servidores propios","Ciclo econ\u00f3mico impacta gasto enterprise"],sa:"Ausente en portfolio SA LP. Secundario a tesis de 'due\u00f1os de vatios'."},
24:{thesis:"Proveedor tradicional de infraestructura empresarial. Menos \u00e1gil que SMCI en capturar demanda IA pura. Sin exposici\u00f3n directa al cuello de botella de potencia. Margen de servicios atractivo pero no es motor de la tesis.",conv:2,horizon:"24\u201336 meses",cats:["L\u00ednea ProLiant para IA gana tracci\u00f3n","Servicios GreenLake (as-a-service) generan recurrencia","Base instalada enterprise masiva"],risks:["Commoditizaci\u00f3n del hardware de servidores","Exposure a ciclo corporativo de IT","Competencia de SMCI/Dell en segmento IA"],sa:"Ausente en portfolio SA LP. Categor\u00eda 'picks and shovels' secundaria."},
25:{thesis:"Proveedor legacy de networking empresarial. En el ciclo de clustering de IA, Cisco pierde relevancia vs. Arista en switches de ultra-velocidad. Posici\u00f3n defensiva pero declinante en infraestructura de IA de vanguardia.",conv:1,horizon:"24\u201336 meses",cats:["Base instalada enterprise masiva genera ingresos recurrentes","Inversiones en Silicon One para data center switching","Adquisiciones en seguridad/observabilidad (Splunk)"],risks:["Obsolescencia vs. Arista en switches 800G","Dependencia de mercado corporativo legacy","Margen presionado por commoditizaci\u00f3n del networking"],sa:"No mencionado en docs SA LP. Tangencial a tesis de infraestructura f\u00edsica de IA."},
26:{thesis:"F\u00e1brica de los servidores Blackwell de NVIDIA. Beneficiario directo del capex masivo de data centers. Pero SA LP evita Taiw\u00e1n por geopol\u00edtica: riesgo soberano es cr\u00edtico en la tesis de soberan\u00eda computacional americana.",conv:2,horizon:"12\u201324 meses",cats:["Contratos directos con NVIDIA para servidores Blackwell","Capex de hiperscalers impulsa volumen de fabricaci\u00f3n","Diversificaci\u00f3n hacia EV y rob\u00f3tica"],risks:["Riesgo geopol\u00edtico Taiw\u00e1n es existencial","Dependencia del dise\u00f1o de NVIDIA","Sanciones/restricciones US-China afectan cadena"],sa:"Excluido de SA LP deliberadamente. Proveedor cr\u00edtico pero Taiw\u00e1n = riesgo geopol\u00edtico."},
27:{thesis:"Proveedor de servidores 'open design' (no propietario NVIDIA). Beneficiario de demanda cloud p\u00fablica e hiperscalers. Menos expuesto que Foxconn a NVIDIA exclusivamente. Pero riesgo Taiw\u00e1n es paralelo.",conv:2,horizon:"12\u201324 meses",cats:["Dise\u00f1o abierto atrae hiperscalers que evitan lock-in","Expansi\u00f3n de l\u00edneas de servidores AI-optimized","Costes competitivos vs. Dell/HPE"],risks:["Riesgo geopol\u00edtico Taiw\u00e1n","Commoditizaci\u00f3n en open design","Margen bajo vs. integradores US con servicios"],sa:"Ausente en SA LP. Taiw\u00e1n geopol\u00edtico es barrera para la tesis."},
28:{thesis:"L\u00edder chino en servidores IA. Beneficiario de demanda dom\u00e9stica China pero SA LP excluye deliberadamente China. Exposici\u00f3n a arquitecturas Huawei/Baidu vs. NVIDIA. No alineado con tesis de soberan\u00eda computacional americana.",conv:1,horizon:"24\u201336 meses",cats:["Demanda dom\u00e9stica china de infraestructura IA crece","Partnerships con Huawei Ascend para chips dom\u00e9sticos","Gobierno chino subsidia independencia tecnol\u00f3gica"],risks:["Sanciones US limitan acceso a tecnolog\u00eda occidental","China excluida de tesis SA LP","Riesgo geopol\u00edtico US-China escala"],sa:"Excluido de SA LP. China excluded deliberadamente por soberan\u00eda computacional americana."},
29:{thesis:"Especialista en PCs industriales y edge computing con 34% de cuota global en edge IA. Menos relevante para data centers centralizados. La tesis de Aschenbrenner es sobre cl\u00fasteres hiperscale centralizados de 1-10 GW, no edge distribuido.",conv:1,horizon:"24\u201336 meses",cats:["Edge IA crece en manufactura/IoT","Cuota de mercado dominante en PCs industriales","Diversificaci\u00f3n geogr\u00e1fica global"],risks:["Mercado fragmentado de edge computing","Irrelevante para tesis de cl\u00fasteres de 10GW","Competencia china en hardware industrial"],sa:"Ausente en SA LP. Tangencial al foco de hiperscalers centralizados con potencia masiva."},
30:{thesis:"Proveedor cr\u00edtico de \u00f3ptica de silicio y componentes de comunicaci\u00f3n para data centers. POSICI\u00d3N CORE SA LP (~7.9% portfolio, top 5). La conectividad \u00f3ptica es parte de la tesis de 'infraestructura f\u00edsica': chips que se comunican con luz en vez de electricidad para ahorrar energ\u00eda. Clave en redes 400G/800G intra-cluster. Aschenbrenner identifica \u00f3ptica como enabler de 'eficiencia extrema' donde el coste el\u00e9ctrico es 80% del opex.",conv:5,horizon:"24\u201336 meses",cats:["\u00d3ptica de silicio reduce consumo energ\u00e9tico en interconexiones","Demanda de 400G/800G en cl\u00fasteres Blackwell/Vera Rubin","Posici\u00f3n core SA LP valida la tesis de infraestructura f\u00edsica"],risks:["Competencia de Coherent Corp e Infinera","Volatilidad de capex de hiperscalers","Riesgo de transici\u00f3n tecnol\u00f3gica (nuevos est\u00e1ndares)"],sa:"HOLDING CORE SA LP: Top 5 posici\u00f3n (~7.92% portfolio Q4 2025). Esencial para conectividad \u00f3ptica."},
// === BATCH 4: \u00d3ptica (cont.), Cloud GPU, Energ\u00eda — IDs 31-40 ===
31:{thesis:"Proveedor cr\u00edtico de componentes \u00f3pticos para interconexi\u00f3n de clusters de IA. SA LP identifica la \u00f3ptica de silicio como cuello de botella para data centers de ultra-alta densidad (>100kW por rack). COHR proporciona conectividad \u00f3ptica esencial para superclusters de 1-10 GW. Beneficiario directo del capex de data centers.",conv:4,horizon:"24\u201336 meses",cats:["Conectividad \u00f3ptica para clusters de alta densidad","Demanda de transceivers 400G/800G se dispara","Capex de hiperscalers en networking \u00f3ptico crece"],risks:["Competencia directa de Lumentum (LITE)","Ciclo de capex de data centers puede frenar","Dependencia de fabricaci\u00f3n en TSMC"],sa:"EN CARTERA SA LP \u2014 Posici\u00f3n secundaria en vertical de \u00f3ptica/comunicaciones"},
32:{thesis:"Player hist\u00f3rico en redes de telecomunicaciones con exposici\u00f3n creciente a interconexi\u00f3n de data centers de IA (backhaul 400Gbps+). Sin embargo, SA LP no mantiene posiciones europeas directas por soberan\u00eda y concentraci\u00f3n en EE.UU. Nokia pierde relevancia vs. Arista en switches de ultra-velocidad para IA.",conv:2,horizon:"24\u201336 meses",cats:["Backhaul de redes para data centers","Soluciones de networking IP para IA","Base instalada de operadores telco"],risks:["Exposici\u00f3n geogr\u00e1fica (Finlandia, no USA)","Competencia de Arista Networks en switching","Ciclo de capex telco independiente de IA"],sa:"No en SA LP. Fuera del mandato geogr\u00e1fico 100% USA."},
33:{thesis:"Similar a Nokia: proveedor de redes telco con exposici\u00f3n a conectividad de data centers. Arquitecturas Open RAN crean oportunidades en interconexi\u00f3n de clusters. Pero no es veh\u00edculo preferente de SA LP por restricci\u00f3n geogr\u00e1fica y mejor valoraci\u00f3n de peers US.",conv:2,horizon:"24\u201336 meses",cats:["Open RAN para infraestructura de borde IA","Conectividad de data centers","Diversificaci\u00f3n vs. Arista/Broadcom"],risks:["Exposici\u00f3n no-USA (Suecia)","Ciclo de capex telco separado de IA","Competencia de Arista/Broadcom en DC switching"],sa:"No en SA LP. Exposici\u00f3n geogr\u00e1fica incompatible con estrategia USA-only."},
34:{thesis:"MAYOR HOLDING DE SA LP (~15.9% portfolio, ~$1.2B). CoreWeave es intermediario cr\u00edtico entre mineras BTC reconvertidas (con energ\u00eda disponible) y demanda de GPUs de hiperscalers. Convierte megavatios ociosos en capacidad de c\u00f3mputo monetizable. SA LP mantiene posici\u00f3n grande + CALL options para upside asim\u00e9trico en expansi\u00f3n de capacidad de c\u00f3mputo descentralizado fuera de AWS/Azure/GCP.",conv:5,horizon:"12\u201324 meses",cats:["Cloud GPU bajo demanda escala explosivamente","Reconversi\u00f3n de infraestructura BTC a IA","CALL options de SA LP indican convexidad m\u00e1xima"],risks:["Competencia de proveedores cloud p\u00fablicos (AWS/Azure)","Riesgo de sobrecapacidad de GPU si demanda frena","IPO reciente (mar-2025) \u2014 volatilidad de lock-up"],sa:"TOP HOLDING SA LP ~$1.2B (15.9%), CALL options para convexidad"},
35:{thesis:"Arquetipo de la tesis de Aschenbrenner: minero BTC que reconvirti\u00f3 infraestructura energ\u00e9tica (permisos de red, subestaciones) hacia hosting de GPUs para IA. El arbitraje: sitios de 50-200 MW con infraestructura el\u00e9ctrica lista que tardar\u00edan a\u00f1os en obtener permisos. Genera ingresos recurrentes via power-as-a-service para hiperscalers.",conv:4,horizon:"24\u201336 meses",cats:["Infraestructura energ\u00e9tica ya conectada a red de alta tensi\u00f3n","Reconversi\u00f3n BTC\u2192IA multiplica valor del MW 10x","Demanda de hosting GPU crece con cl\u00fasteres de 1-10 GW"],risks:["Volatilidad de criptomonedas afecta percepci\u00f3n","Dependencia de capex de hiperscalers","Variabilidad de precios de energ\u00eda"],sa:"EN CARTERA SA LP \u2014 Posici\u00f3n en miner\u00eda BTC reconvertida para IA"},
36:{thesis:"SEGUNDO MAYOR HOLDING DE SA LP (~$911M). Bloom suministra c\u00e9lulas de combustible que permiten a data centers operar con AUTONOM\u00cdA ENERG\u00c9TICA completa. En 'power crunch' (demanda de 1,000 TWh+ para IA en 2026), cada MW generado in-situ reduce exposici\u00f3n a grid congestionado. Backlog de $6B, crecimiento YoY +105% en ingresos operativos. Es el coraz\u00f3n de la tesis de 'due\u00f1os de vatios'.",conv:5,horizon:"24\u201336 meses",cats:["Generaci\u00f3n energ\u00e9tica in-situ para data centers","Power crunch: demanda supera capacidad de grid","Backlog de $6B y crecimiento +105% YoY"],risks:["Ciclo de capex de data centers puede frenar","Regulaci\u00f3n ambiental sobre celdas de combustible","Competencia de generadores nucleares SMR"],sa:"TOP HOLDING SA LP ~$911M. Posici\u00f3n core en tesis de 'owners of watts'."},
37:{thesis:"Mayor operador nuclear de EE.UU. Demanda de hiperscalers por baseload libre de carbono (PPAs con Google, Microsoft, Meta). Nuclear + SMR ser\u00e1n fuente de potencia preferida para cl\u00fasteres de 1-10 GW: capacidad sin variabilidad, 24/7. No es holding de SA LP pero nominado en docs como player cr\u00edtico del superciclo energ\u00e9tico.",conv:4,horizon:"24\u201336 meses",cats:["PPAs nucleares con hiperscalers para data centers","Baseload 24/7 sin variabilidad \u2014 ideal para IA","Reactivaci\u00f3n de plantas nucleares paradas"],risks:["Regulaci\u00f3n nuclear lenta y costosa","Riesgo de construcci\u00f3n/permisos de nuevas plantas","Competencia de SMR (Oklo, NuScale)"],sa:"No en 13F SA LP. Mencionado como player cr\u00edtico en superciclo nuclear."},
38:{thesis:"Operador hist\u00f3rico de renovables (e\u00f3lica, solar) con PPAs con hiperscalers. Pero su modelo depende de transmisi\u00f3n de red p\u00fablica \u2014 menos 'soberano' que Bloom/Constellation. En power crunch, preferencia migra hacia soluciones descentralizadas (Bloom) o baseload (nuclear). NextEra es value-play tradicional, no convexidad.",conv:3,horizon:"24\u201336 meses",cats:["PPAs renovables con tech companies a 15-20 a\u00f1os","Mayor operador e\u00f3lico/solar de EE.UU.","Ingresos recurrentes predecibles"],risks:["Competencia de generadores descentralizados (Bloom)","Sensibilidad a tipos de inter\u00e9s","Riesgo regulatorio FERC"],sa:"No en SA LP. Player de renovables pero no core a tesis de energ\u00eda descentralizada."},
39:{thesis:"Generador de energ\u00eda el\u00e9ctrica con portfolio diversificado (gas, nuclear). SA LP reconoce a Vistra como beneficiario de 'power crunch': su capacidad de generaci\u00f3n se revalor\u00eda cuando la demanda de data centers supera la oferta del grid. Suministro inel\u00e1stico + demanda el\u00e1stica = precios m\u00e1s altos y m\u00e1rgenes mejorados.",conv:4,horizon:"12\u201324 meses",cats:["Tightness del grid el\u00e9ctrico sube precios de generaci\u00f3n","Portfolio nuclear + gas ofrece baseload fiable","Demanda de data centers es inel\u00e1stica al precio"],risks:["Volatilidad de precios de energ\u00eda","Ciclo de capex de data centers puede frenar","Transici\u00f3n de mezcla de combustibles"],sa:"EN CARTERA SA LP \u2014 Posici\u00f3n en generaci\u00f3n el\u00e9ctrica pura"},
40:{thesis:"Productor de gas natural con exposici\u00f3n al superciclo energ\u00e9tico. Gas natural es fuente de respaldo para pilas de combustible (Bloom) y generadores de transici\u00f3n mientras nuclear escala. EQT beneficia de demanda de gas para plantas de ciclo combinado que alimentan data centers. Posici\u00f3n = exposici\u00f3n a commodity energ\u00e9tico durante superciclo de IA.",conv:3,horizon:"12\u201324 meses",cats:["Demanda de gas para data centers y generaci\u00f3n el\u00e9ctrica","Gas natural como puente hacia nuclear/renovables","Precios del gas suben por tightness del mercado"],risks:["Volatilidad de precios de gas natural","Transici\u00f3n energ\u00e9tica a largo plazo reduce demanda","Competencia de renovables y nuclear"],sa:"EN CARTERA SA LP \u2014 Posici\u00f3n en gas natural como commodity de superciclo"},
// === BATCH 5: Electrificaci\u00f3n, Cables, Utilities, Nuclear — IDs 41-50 ===
41:{thesis:"SA LP mantiene posici\u00f3n. Liberty Energy provee servicios energ\u00e9ticos cr\u00edticos para integraci\u00f3n de redes de potencia en centros de datos megaescala. Rotaci\u00f3n desde semiconductores hacia 'due\u00f1os de vatios' que controlan la energ\u00eda base para cl\u00fasteres de 1-10 GW.",conv:4,horizon:"24\u201336 meses",cats:["Servicios energ\u00e9ticos para integraci\u00f3n de data centers","Acceso a infraestructura el\u00e9ctrica cr\u00edtica preexistente","Demanda de reconversi\u00f3n BTC\u2192IA requiere conexi\u00f3n de alta tensi\u00f3n"],risks:["Regulaci\u00f3n el\u00e9ctrica puede limitar expansi\u00f3n","Ca\u00edda inesperada de demanda de IA","Sustituci\u00f3n por energ\u00eda renovable distribuida"],sa:"EN CARTERA SA LP \u2014 Rotaci\u00f3n expl\u00edcita desde NVIDIA/TSMC hacia 'due\u00f1os de vatios'"},
42:{thesis:"'Pala y pico' de la electrificaci\u00f3n IA: distribuci\u00f3n el\u00e9ctrica cr\u00edtica, UPS, protecci\u00f3n de cargas cr\u00edticas para data centers. Eaton provee equipamiento que distribuye potencia desde la subestaci\u00f3n hasta el rack (800V DC, transformadores, barras colectoras). Un data center IA consume 3x m\u00e1s cobre y equipamiento el\u00e9ctrico que uno tradicional.",conv:4,horizon:"24\u201336 meses",cats:["Demanda de equipamiento el\u00e9ctrico para data centers crece >10% org\u00e1nico","3x m\u00e1s cobre/equipamiento por data center IA vs tradicional","Captura 'last mile' de distribuci\u00f3n el\u00e9ctrica"],risks:["Competencia de ABB y Schneider Electric","Saturaci\u00f3n de capex de data centers","Hiperscalers pueden integrar verticalmente"],sa:"No en SA LP (domicilio Irlanda). En cartera modelo ChatGPT como clave 'pala y pico' electrificaci\u00f3n."},
43:{thesis:"Gesti\u00f3n de energ\u00eda + UPS + distribuci\u00f3n el\u00e9ctrica para IA. Schneider provee infraestructura 800V DC, transformadores, UPS para data centers de 100 kW/rack. Exposici\u00f3n de mercado datacenter = 30% del portfolio. Beneficiario directo de migraci\u00f3n a arquitecturas de distribuci\u00f3n de ultra-alta densidad.",conv:4,horizon:"24\u201336 meses",cats:["Segmento datacenter crece >10% org\u00e1nico","L\u00edder mundial en gesti\u00f3n de energ\u00eda y UPS","Infraestructura 800V DC para racks de alta densidad"],risks:["Competencia de Eaton y ABB","Exposici\u00f3n a recesi\u00f3n europea","Compresi\u00f3n de m\u00e1rgenes por commodities"],sa:"No en SA LP (francesa). Cr\u00edtica en cadena global. En cartera modelo ChatGPT para infraestructura datacenter."},
44:{thesis:"Equipamiento industrial de red el\u00e9ctrica de ultra-potencia. ABB provee transformadores, disyuntores, equipos de conmutaci\u00f3n para redes de subtransmisi\u00f3n que alimentan cl\u00fasteres de 1-10 GW. Infraestructura r\u00edgida con m\u00faltiples a\u00f1os de ciclo de instalaci\u00f3n = demanda inel\u00e1stica. Socio cr\u00edtico de operadores nucleares (SMR).",conv:3,horizon:"36+ meses",cats:["Transformadores y equipos de conmutaci\u00f3n para cl\u00fasteres GW","Socio de operadores nucleares SMR","Ciclo largo de instalaci\u00f3n = demanda inel\u00e1stica"],risks:["Competencia china en equipamiento el\u00e9ctrico","Sobre-exposici\u00f3n a capex europeo","Ciclo de desinflaci\u00f3n"],sa:"No en SA LP (suiza). Cr\u00edtico para SMR + potencia descentralizada pero fuera de mandato US."},
45:{thesis:"L\u00edder en cables de ultra-alta tensi\u00f3n + submarinos. Data centers IA consumen 3x m\u00e1s cobre. Tesis de Aschenbrenner predice islas energ\u00e9ticas descentralizadas = requieren cableado de transmisi\u00f3n privado. Prysmian captura el 'paso de infraestructura' en capas de transmisi\u00f3n-distribuci\u00f3n. Cobre en m\u00e1ximos hist\u00f3ricos >$13,900/ton.",conv:4,horizon:"24\u201336 meses",cats:["Demanda de cobre para electrificaci\u00f3n IA supera transici\u00f3n energ\u00e9tica","Cableado de alta tensi\u00f3n privado para islas energ\u00e9ticas","Cobre en m\u00e1ximos hist\u00f3ricos por escasez estructural"],risks:["Ca\u00edda de precio de cobre","Competencia de Nexans","Sustituci\u00f3n por conductores alternativos"],sa:"No en SA LP (italiana). Materias primas cr\u00edticas: cobre = 'nuevo petr\u00f3leo' de IA."},
46:{thesis:"Cableado de alta tensi\u00f3n complementario a Prysmian. Nexans provee cables de potencia y especiales para data centers e infraestructura de red. Beneficiario del superciclo de cobre. Presencia en EE.UU. + Europa = diversificaci\u00f3n geogr\u00e1fica. Menor convexidad pura a IA que Prysmian.",conv:3,horizon:"24\u201336 meses",cats:["Superciclo de cobre impulsa demanda de cableado","Presencia en EE.UU. a\u00f1ade diversificaci\u00f3n","Demanda de data centers + renovables + telco"],risks:["Competencia intensificada de Prysmian","Compresi\u00f3n de m\u00e1rgenes por commodity","Concentraci\u00f3n en cobre como materia prima"],sa:"No en SA LP (francesa). Competidor de Prysmian con diversificaci\u00f3n."},
47:{thesis:"Acuerdos de compra de potencia (PPAs) a largo plazo con tech companies (Google, Meta, Amazon) para energ\u00eda renovable masiva. Iberdrola = 'terrateniente' de energ\u00eda renovable con ingresos recurrentes y previsibles (PPA = 15-20 a\u00f1os). Migraci\u00f3n de demanda desde grid p\u00fablico hacia contratos bilaterales.",conv:4,horizon:"24\u201336 meses",cats:["PPAs renovables de 15-20 a\u00f1os con hiperscalers","M\u00faltiples GW de contratos firmados","Ingresos recurrentes predecibles + dividendo estable"],risks:["Exposici\u00f3n a grid p\u00fablico espa\u00f1ol","Regulaci\u00f3n de m\u00e1rgenes renovables en Europa","Ca\u00edda de precios de electricidad"],sa:"No en SA LP (espa\u00f1ola). Mencionada en docs como proveedor de energ\u00eda renovable para data centers."},
48:{thesis:"Operador integrado de energ\u00eda + distribuci\u00f3n para data centers espa\u00f1oles. Acceso directo a subestaciones de potencia + redes de distribuci\u00f3n = barrera de entrada. PPAs con tech companies generan ingresos recurrentes. Menos convexidad a IA que Iberdrola (activos renovables directos).",conv:3,horizon:"24\u201336 meses",cats:["PPAs con hiperscalers generan demanda recurrente","Distribuci\u00f3n + generaci\u00f3n integrada","Barrera de entrada por acceso a subestaciones"],risks:["Regulaci\u00f3n espa\u00f1ola de m\u00e1rgenes el\u00e9ctricos","Integraci\u00f3n vertical por Google/Meta","Volatilidad de precios de electricidad"],sa:"No en SA LP (espa\u00f1ola). Operador integrado con foco local."},
49:{thesis:"Constructor de infraestructura de energ\u00eda. ACS = experto en obras civiles para infraestructura cr\u00edtica (redes de potencia, subestaciones, interconexiones). Capex de cl\u00fasteres de 1-10 GW requiere ejecuci\u00f3n de proyectos civiles masivos. 'La pala f\u00edsica' de la transici\u00f3n energ\u00e9tica.",conv:3,horizon:"24\u201336 meses",cats:["Ejecuci\u00f3n EPC para infraestructura de potencia","Demanda de construcci\u00f3n de subestaciones + interconexiones","Ciclo largo de capex en infraestructura"],risks:["Sobrecostes en proyectos de construcci\u00f3n","M\u00e1rgenes de EPC comprimidos (5-8%)","Concentraci\u00f3n geogr\u00e1fica en Espa\u00f1a"],sa:"No en SA LP (espa\u00f1ola). Contratista cr\u00edtico de infraestructura con menor convexidad a IA."},
50:{thesis:"Dise\u00f1o y fabricaci\u00f3n de Small Modular Reactors (SMR) para data centers descentralizados. Tesis de Aschenbrenner: cl\u00fasteres de 1-10 GW requieren baseload continuo 24/7 descentralizado = SMR es la soluci\u00f3n. Hito de despliegue en Anglesey (Gales) 2026-2027. Potenciales contratos con Microsoft/Meta/Google para SMRs junto a data centers = 'isla energ\u00e9tica autosuficiente'.",conv:3,horizon:"36+ meses",cats:["SMR habilita islas energ\u00e9ticas para data centers","Primer despliegue UK previsto 2026-2027","Demanda estimada ~150 GW de capacidad nuclear por 2040"],risks:["Riesgo tecnol\u00f3gico: SMR a\u00fan no desplegado comercialmente","Regulaci\u00f3n nuclear estricta y lenta","Costes de capex SMR inciertos","Competencia de Oklo y NuScale"],sa:"No en SA LP (brit\u00e1nica). Opci\u00f3n de convexidad si SMR se despliega. Riesgo alto / horizonte largo."},
// === BATCH 6: Nuclear, Uranio, Refrigeraci\u00f3n, Materias Primas — IDs 51-60 ===
51:{thesis:"Mayor productor de uranio mundial. Energ\u00eda nuclear es cr\u00edtica para data centers de 1-10 GW que no pueden apagarse. Precio de uranio en m\u00e1ximo de 17 meses ($85/lb ene-2026) por disrupciones en Kazatomprom. Tesis de 'islas energ\u00e9ticas' requiere suministro de combustible confiable. Inventarios en m\u00ednimos hist\u00f3ricos.",conv:4,horizon:"24\u201336 meses",cats:["Precio uranio en m\u00e1ximos por escasez estructural","Demanda nuclear para data centers de 1-10 GW","Inventarios de uranio en m\u00ednimos hist\u00f3ricos"],risks:["Regulaci\u00f3n nuclear m\u00e1s estricta","Gesti\u00f3n de residuos nucleares","Sustituci\u00f3n por renovables + almacenamiento"],sa:"No en 13F SA LP. Tesis anticipa demanda explosiva de baseload nuclear. Acceso v\u00eda Sprott Physical Uranium Trust (U.UN)."},
52:{thesis:"Microreactores respaldados por Sam Altman (ex OpenAI). Alineado directamente con tesis de 'nubes soberanas' con energ\u00eda nuclear privada. Reactores compactos desplegables en 3-5 a\u00f1os vs 15 a\u00f1os de plantas tradicionales. Modelo energy-as-a-service para data centers. Meta, Amazon, Google han contratado >10 GW nucleares en 2025.",conv:5,horizon:"24\u201336 meses",cats:["Primeros despliegues comerciales 2026-2027","Energy-as-a-service para hiperscalers","Respaldo de Sam Altman alinea con ecosistema OpenAI/IA"],risks:["Retrasos regulatorios en certificaci\u00f3n NRC","Costos de construcci\u00f3n mayores que proyectados","Competencia de NuScale y Rolls-Royce SMR"],sa:"No en 13F SA LP. Oklo encaja en 'due\u00f1os de vatios' reconvertidos. Director de Research SA LP ha escrito sobre alineaci\u00f3n IA-nuclear."},
53:{thesis:"L\u00edder en tecnolog\u00eda SMR certificada. Reactores modulares de 20-50 MW permiten escalado granular de capacidad junto a clusters de GPUs. Modelo de ingresos: licencias de tecnolog\u00eda + construcci\u00f3n modular. Demanda de energ\u00eda libre de carbono continua es barrera a soluciones renovables intermitentes.",conv:4,horizon:"36+ meses",cats:["Tecnolog\u00eda SMR m\u00e1s avanzada en certificaci\u00f3n","Escalado granular: 20-50 MW por m\u00f3dulo","Despliegues piloto en EE.UU. 2026-2029"],risks:["Competencia global de Rolls-Royce","Costo de capital para plantas nuevas","Aceptaci\u00f3n p\u00fablica de nuclear cerca de data centers"],sa:"No en SA LP. SMR es pilar #2 de Aschenbrenner ('salto a 10 GW'). Play de 'due\u00f1os de vatios'."},
54:{thesis:"Mayor productor mundial de uranio (37% oferta global). Crisis operativa 2025-2026 impuls\u00f3 precio a $85/lb. Escasez estructural de uranio crea suelo de precios. GDR accesible en LSE. Reservas de bajo costo de extracci\u00f3n. Demanda sostenida de hiperscalers asegura demanda por d\u00e9cadas.",conv:3,horizon:"24\u201336 meses",cats:["37% de oferta global de uranio","Crisis operativa sostiene precios altos","GDR en LSE accesible a inversores occidentales"],risks:["Volatilidad pol\u00edtica en Kazajist\u00e1n","Sanciones geopol\u00edticas","Riesgo de nacionalizaci\u00f3n","Dependencia de Rusia para transporte"],sa:"No en SA LP. Aschenbrenner evita Kazajist\u00e1n por soberan\u00eda US. Pero disrupci\u00f3n valida tesis de escasez."},
55:{thesis:"Miner\u00eda de uranio canadiense de bajo costo (Proyecto Rayo, Saskatchewan). Pre-producci\u00f3n con financiamiento asegurado y reserve grade de clase mundial. Exposici\u00f3n a superciclo de uranio con leverage operacional. Alternativa a Cameco con mejor perfil de crecimiento.",conv:3,horizon:"36+ meses",cats:["Reserve grade de clase mundial en Saskatchewan","Leverage operacional a superciclo de uranio","Alternativa de crecimiento a Cameco"],risks:["Delays en construcci\u00f3n de mina","Riesgo ambiental/regulatorio en Canad\u00e1","Capex mayor que presupuestado"],sa:"No en SA LP. Desrisca sobre-dependencia de Kazatomprom en cadena de suministro de uranio."},
56:{thesis:"'Est\u00e1ndar de oro en racks de IA'. L\u00edder indiscutido en refrigeraci\u00f3n l\u00edquida: bombas de precisi\u00f3n, fluidos diel\u00e9ctricos, placas de intercambio de calor. Docs: 'En 2026, el aire ya no basta. Un rack de NVIDIA consume tanta energ\u00eda como una calle entera.' Refrigeraci\u00f3n l\u00edquida es requisito inel\u00e1stico de capex para todos los nuevos clusters de GPUs.",conv:4,horizon:"24\u201336 meses",cats:["Refrigeraci\u00f3n l\u00edquida obligatoria para racks IA 2026+","80%+ de nuevos racks requieren liquid cooling","Aftermarket services = ingresos recurrentes"],risks:["Nuevos competidores (Modine, Munters)","Problemas de fiabilidad de fluidos","Integraci\u00f3n con dise\u00f1os propietarios NVIDIA/AMD"],sa:"Impl\u00edcito en tesis SA LP de 'eficiencia extrema'. Lumentum (\u00f3ptica) + Vertiv (cooling) = pilares de reducci\u00f3n cost-per-watt."},
57:{thesis:"Especialista en transferencia de calor (heat exchangers) para data centers. Supplier cr\u00edtico de componentes de refrigeraci\u00f3n l\u00edquida: placas soldadas, sistemas cerrados. Menos visible que Vertiv pero player key mencionado en docs. Acceso a mercado emergente de cooling con menor competencia.",conv:3,horizon:"24\u201336 meses",cats:["Demanda de heat transfer solutions crece con IA","Componentes de refrigeraci\u00f3n l\u00edquida especializados","Potencial consolidaci\u00f3n sectorial 2028+"],risks:["Menor escala que Vertiv","Competencia de precios comprime m\u00e1rgenes","Dependencia de suministro de materiales"],sa:"No en SA LP. Second mover en cooling infrastructure. Diversificaci\u00f3n si Vertiv insuficiente."},
58:{thesis:"L\u00edder sueco en control de clima industrial. Tecnolog\u00eda de desecaci\u00f3n y humidificaci\u00f3n cr\u00edtica para data centers con refrigeraci\u00f3n l\u00edquida (requieren control extremo de humedad para evitar condensaci\u00f3n). Mencionado expl\u00edcitamente en docs como player en thermal management. Alto switching cost.",conv:2,horizon:"24\u201336 meses",cats:["Control de humedad cr\u00edtico para liquid cooling","Alto switching cost en instalaciones","Retrofits de data centers existentes"],risks:["Exposici\u00f3n a Suecia/Europa (SA LP prefiere US)","Menor exposure a hiperscalers US","Riesgo de consolidaci\u00f3n sectorial"],sa:"No en SA LP. Europea. Tema relevante pero fuera del mandato geogr\u00e1fico US."},
59:{thesis:"Miner\u00eda de cobre de escala masiva. Docs citan literalmente: 'cobre = nuevo petr\u00f3leo de IA'. Data center IA usa 3x m\u00e1s cobre que tradicional (cables, barras colectoras, transformadores). Cobre en m\u00e1ximos hist\u00f3ricos >$13,900/ton (Q1 2026). Escasez minera real: disrupciones en Grasberg y Kamoa-Kakula.",conv:4,horizon:"24\u201336 meses",cats:["3x m\u00e1s cobre por data center IA vs tradicional","Cobre en m\u00e1ximos hist\u00f3ricos por escasez estructural","Disrupciones mineras sostienen precios altos"],risks:["Ca\u00edda de precio de cobre por recesi\u00f3n","Disrupciones operativas en minas","Competencia de reciclaje de cobre"],sa:"No en SA LP. Pero tesis de cobre como 'new oil' es expl\u00edcita en docs. FCX = leverage puro."},
60:{thesis:"Miner\u00eda de cobre diversificada (UK/Chile). Mayor productor chileno. Operaciones de bajo costo (ore grades altos). GDR en London accesible. Superciclo de cobre documentado: +40% en 2025, nuevos m\u00e1ximos Q1 2026. Alternativa a FCX con exposici\u00f3n latinoamericana.",conv:3,horizon:"24\u201336 meses",cats:["Producci\u00f3n de bajo costo en Chile","Superciclo de cobre +40% en 2025","Expansi\u00f3n de capacidad con ROIC elevado"],risks:["Riesgo pol\u00edtico en Chile","Costo de agua en Atacama","Ca\u00edda de demanda global de cobre"],sa:"No en SA LP (100% US). Exposici\u00f3n latinoamericana al superciclo de cobre."},

function openPanel(id){
  const a=ASSETS.find(x=>x.id===id);if(!a)return;
  const h=HYP[id]; // hypothesis data (may be undefined)
  const btype=a.type==='stock'?'b-stock':a.type==='etf'?'b-etf':'b-trust';
  const badges=[`<span class="p-badge ${btype}">${a.type}</span>`];
  if(a.ucits)badges.push(`<span class="p-badge b-ucits">UCITS</span>`);
  if(a.sa)badges.push(`<span class="p-badge b-sa">SA LP 13F</span>`);
  if(a.adr)badges.push(`<span class="p-badge" style="background:rgba(139,92,246,.1);color:#8b5cf6">ADR</span>`);
  if(a.priv)badges.push(`<span class="p-badge" style="background:rgba(100,116,139,.1);color:#64748b">Privada</span>`);

  let providerHtml=a.provider?`<div class="p-field"><span class="fl">Proveedor</span><span class="fv">${a.provider}</span></div>`:'';
  let noteHtml=a.note?`<div class="p-field" style="grid-column:1/-1"><span class="fl">Nota</span><span class="fv" style="color:#f59e0b">${a.note}</span></div>`:'';

  // Hypothesis rendering
  const hasHyp=!!h;
  const src=hasHyp?' src-research':'';
  const thesisHtml=hasHyp?`<div class="${src}" style="font-size:14px;color:var(--text);line-height:1.6">${h.thesis}</div>`:`<div class="hv">Pendiente de rellenar...</div>`;
  const convHtml=hasHyp?[1,2,3,4,5].map(i=>`<div class="conviction-dot${i<=h.conv?' filled':''}"></div>`).join('')+`<span style="font-size:11px;color:var(--text2);margin-left:4px">${h.conv} / 5</span>`:[1,2,3,4,5].map(()=>`<div class="conviction-dot"></div>`).join('')+`<span style="font-size:11px;color:var(--text3);margin-left:4px">\u2014 / 5</span>`;
  const horizonHtml=hasHyp?`<div class="${src}" style="font-size:13px;color:var(--text)">${h.horizon}</div>`:`<div class="hv">\u2014</div>`;
  const catsHtml=hasHyp?`<div class="${src}">`+h.cats.map(c=>`<div class="cat-item">${c}</div>`).join('')+'</div>':`<div class="cat-item">Pendiente de an\u00e1lisis</div>`;
  const risksHtml=hasHyp?`<div class="${src}">`+h.risks.map(r=>`<div class="risk-item">${r}</div>`).join('')+'</div>':`<div class="risk-item">Pendiente de an\u00e1lisis</div>`;
  const saHtml=hasHyp&&h.sa?`<div class="hyp-field"><div class="hl">Posici\u00f3n SA LP</div><div class="${src}" style="font-size:13px;color:${h.sa.includes('LIQUIDADO')||h.sa.includes('No en')?'var(--text2)':'var(--accent)'}; line-height:1.5">${h.sa}</div></div>`:'';

  panelContent.innerHTML=`
    <div class="p-header">
      <div class="p-vertical" style="color:${a.vc}">${a.vertical}</div>
      <div class="p-ticker">${a.ticker}</div>
      <div class="p-name">${a.name}</div>
      <div class="p-badges">${badges.join('')}</div>
    </div>
    <div class="p-body">
      <div class="p-section">
        <div class="p-section-title">Descripci\u00f3n</div>
        <div class="p-role">${a.role}</div>
      </div>
      <div class="p-section">
        <div class="p-section-title">Datos del activo</div>
        <div class="p-grid">
          <div class="p-field"><span class="fl">ISIN</span><span class="fv">${a.isin==='NO COTIZA'?'<span style="color:#ef4444">No cotiza</span>':a.isin}</span></div>
          <div class="p-field"><span class="fl">Bolsa</span><span class="fv">${a.exchange}</span></div>
          <div class="p-field"><span class="fl">Pa\u00eds</span><span class="fv">${a.country}</span></div>
          <div class="p-field"><span class="fl">Tipo</span><span class="fv">${a.type.toUpperCase()}</span></div>
          ${providerHtml}${noteHtml}
        </div>
      </div>

      <div class="hyp-divider"></div>
      <div class="hyp-title">Hip\u00f3tesis de inversi\u00f3n${hasHyp?'':' <span style="font-size:9px;color:var(--text3);font-weight:400;letter-spacing:0;text-transform:none">(pendiente)</span>'}</div>

      <div class="hyp-field">
        <div class="hl">Tesis</div>
        ${thesisHtml}
      </div>

      <div class="hyp-meta">
        <div class="hyp-field">
          <div class="hl">Convicci\u00f3n</div>
          <div class="conviction-row">${convHtml}</div>
        </div>
        <div class="hyp-field">
          <div class="hl">Horizonte</div>
          ${horizonHtml}
        </div>
      </div>

      ${saHtml}

      <div class="hyp-field" style="margin-top:16px">
        <div class="hl">Catalizadores</div>
        <div class="catalyst-list">${catsHtml}</div>
      </div>

      <div class="hyp-field">
        <div class="hl">Riesgos</div>
        <div class="risk-list">${risksHtml}</div>
      </div>
    </div>
  `;
  overlay.classList.add('open');
  document.body.style.overflow='hidden';
}

function closePanel(){
  overlay.classList.remove('open');
  document.body.style.overflow='';
}
overlayBg.onclick=closePanel;
panelClose.onclick=closePanel;
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel()});

// Search
document.getElementById('search').addEventListener('input',e=>{query=e.target.value.toLowerCase();render()});

// Init
render();
</script>
</body>
</html>
