// Get all unique verticals
const verticals = [...new Set(ASSETS.map(a => a.vertical))];

// State
let activeType = 'all';
let activeVertical = null;
let searchQuery = '';

// Render vertical filter buttons
const vfContainer = document.getElementById('verticalFilters');
function renderVerticalFilters() {
  const filtered = activeType === 'all' ? verticals : verticals.filter(v => {
    return ASSETS.some(a => a.vertical === v && (activeType === 'all' || a.type === activeType));
  });
  vfContainer.innerHTML = '<div class="filter-btn' + (!activeVertical ? ' active' : '') + '" data-v="">Todas</div>' +
    filtered.map(v => `<div class="filter-btn${activeVertical===v?' active':''}" data-v="${v}">${v}</div>`).join('');
  vfContainer.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeVertical = btn.dataset.v || null;
      render();
    });
  });
}

// Type tabs
document.querySelectorAll('.type-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    activeType = tab.dataset.type;
    activeVertical = null;
    document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    render();
  });
});

// Search
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase();
  render();
});

function getFiltered() {
  return ASSETS.filter(a => {
    if (activeType !== 'all' && a.type !== activeType) return false;
    if (activeVertical && a.vertical !== activeVertical) return false;
    if (searchQuery) {
      const hay = [a.ticker,a.name,a.isin,a.exchange,a.country,a.role,a.vertical,a.provider||''].join(' ').toLowerCase();
      return hay.includes(searchQuery);
    }
    return true;
  });
}

function renderCard(a) {
  const badges = [];
  if (a.type === 'stock') badges.push('<span class="badge badge-stock">Stock</span>');
  if (a.type === 'etf') badges.push('<span class="badge badge-etf">ETF</span>');
  if (a.type === 'trust') badges.push('<span class="badge badge-trust">Trust</span>');
  if (a.ucits) badges.push('<span class="badge badge-ucits">UCITS</span>');
  if (a.sa) badges.push('<span class="badge badge-sa-portfolio">SA LP 13F</span>');
  if (a.adr) badges.push('<span class="badge badge-adr">ADR</span>');
  if (a.private) badges.push('<span class="badge badge-private">Privada</span>');

  const tickerClass = a.private ? 'ticker not-traded' : 'ticker';
  const isinDisplay = a.isin === 'NO COTIZA' ? '<span style="color:var(--red)">No cotiza</span>' : a.isin;

  let meta = `
    <div class="meta-item"><span class="label">ISIN</span><span class="value">${isinDisplay}</span></div>
    <div class="meta-item"><span class="label">Bolsa</span><span class="value">${a.exchange}</span></div>
    <div class="meta-item"><span class="label">Pa\u00eds</span><span class="value">${a.country}</span></div>
    <div class="meta-item"><span class="label">Vertical</span><span class="value">${a.vertical}</span></div>
  `;
  if (a.provider) {
    meta += `<div class="meta-item"><span class="label">Proveedor</span><span class="value">${a.provider}</span></div>`;
  }
  if (a.note) {
    meta += `<div class="meta-item" style="grid-column:1/-1"><span class="label">Nota</span><span class="value" style="color:var(--yellow)">${a.note}</span></div>`;
  }

  return `<div class="card">
    <div class="vertical-tag ${a.vtClass}"></div>
    <div class="top-row">
      <span class="${tickerClass}">${a.ticker}</span>
      <div class="badges">${badges.join('')}</div>
    </div>
    <div class="name">${a.name}</div>
    <div class="role">${a.role}</div>
    <div class="meta">${meta}</div>
  </div>`;
}

function render() {
  renderVerticalFilters();
  const items = getFiltered();
  const grid = document.getElementById('grid');
  const noRes = document.getElementById('noResults');
  const statsBar = document.getElementById('statsBar');

  if (items.length === 0) {
    grid.innerHTML = '';
    noRes.style.display = 'block';
    statsBar.innerHTML = '';
    return;
  }
  noRes.style.display = 'none';

  // Stats
  const stocks = items.filter(i=>i.type==='stock').length;
  const etfs = items.filter(i=>i.type==='etf').length;
  const trusts = items.filter(i=>i.type==='trust').length;
  const saCount = items.filter(i=>i.sa).length;
  const ucitsCount = items.filter(i=>i.ucits).length;
  const countries = [...new Set(items.map(i=>i.country))].length;
  statsBar.innerHTML = `
    <div class="stat"><b>${items.length}</b> activos</div>
    <div class="stat"><b>${stocks}</b> acciones</div>
    <div class="stat"><b>${etfs}</b> ETFs</div>
    <div class="stat"><b>${trusts}</b> trusts</div>
    <div class="stat"><b>${saCount}</b> en portfolio SA LP</div>
    <div class="stat"><b>${ucitsCount}</b> UCITS</div>
    <div class="stat"><b>${countries}</b> pa\u00edses</div>
  `;

  // Group by vertical
  const grouped = {};
  items.forEach(a => {
    if (!grouped[a.vertical]) grouped[a.vertical] = [];
    grouped[a.vertical].push(a);
  });

  let html = '';
  for (const [vertical, assets] of Object.entries(grouped)) {
    html += `<div class="section-label">${vertical} (${assets.length})</div>`;
    html += assets.map(renderCard).join('');
  }
  grid.innerHTML = html;
}

render();
</script>
